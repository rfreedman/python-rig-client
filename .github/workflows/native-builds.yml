name: Build and Release GraalPy Native Executables

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  linux-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
        package: [deb, rpm]
    env:
      APP_NAME: myapp
      ENTRYPOINT: app.py
    steps:
      - uses: actions/checkout@v4

      - name: Compute VERSION
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="main-latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION is $VERSION"

      - name: Get latest GraalPy release
        shell: bash
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/oracle/graalpython/releases/latest \
            | jq -r '.tag_name')
          LATEST_VERSION=${LATEST_TAG#graal-}
          echo "GRAALPY_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "Latest GraalPy version: $LATEST_VERSION"

      - name: Install GraalPy
        shell: bash
        run: |
          ARCH=${{ matrix.arch }}
          EXT=tar.gz
          FILENAME="graalpy-${GRAALPY_VERSION}-linux-${ARCH}.${EXT}"
          URL="https://github.com/oracle/graalpython/releases/download/graal-${GRAALPY_VERSION}/${FILENAME}"
          echo "Downloading $URL"
          mkdir -p $HOME/graalpy
          curl -L -f -o graalpy.pkg "$URL" || { echo "GraalPy asset not found for linux-$ARCH"; exit 1; }
          tar -xzf graalpy.pkg -C $HOME/graalpy --strip-components=1
          echo "$HOME/graalpy/bin" >> $GITHUB_PATH
          graalpy --version

      - name: Cache Python virtual environment
        uses: actions/cache@v3
        with:
          path: .venv
          key: python-venv-${{ runner.os }}-${{ matrix.arch }}-${{ env.GRAALPY_VERSION }}
          restore-keys: |
            python-venv-${{ runner.os }}-${{ matrix.arch }}-

      - name: Setup virtual environment
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then
            graalpy -m venv .venv
          fi
          source .venv/bin/activate
          python -m pip install --upgrade pip wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build native executable
        shell: bash
        run: |
          source .venv/bin/activate
          mkdir -p dist
          graalpy -m standalone native \
            --module "${ENTRYPOINT}" \
            --output "dist/${APP_NAME}" \
            --venv ".venv"
          ls -lah dist

      - name: Install fpm for packaging
        if: ${{ matrix.package != 'none' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Package application
        if: ${{ matrix.package != 'none' }}
        shell: bash
        run: |
          mkdir -p pkg
          if [[ "${{ matrix.package }}" == "deb" ]]; then
            fpm -s dir -t deb -n $APP_NAME -v $VERSION ./dist/${APP_NAME}=/usr/local/bin/${APP_NAME}
          elif [[ "${{ matrix.package }}" == "rpm" ]]; then
            fpm -s dir -t rpm -n $APP_NAME -v $VERSION ./dist/${APP_NAME}=/usr/local/bin/${APP_NAME}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-${{ matrix.package }}
          path: |
            dist/
            pkg/

  macos-build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      APP_NAME: myapp
      ENTRYPOINT: app.py
    steps:
      - uses: actions/checkout@v4

      - name: Compute VERSION
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="main-latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Get latest GraalPy release
        shell: bash
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/oracle/graalpython/releases/latest \
            | jq -r '.tag_name')
          LATEST_VERSION=${LATEST_TAG#graal-}
          echo "GRAALPY_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "Latest GraalPy version: $LATEST_VERSION"

      - name: Install GraalPy
        shell: bash
        run: |
          ARCH=${{ matrix.arch }}
          EXT=tar.gz
          FILENAME="graalpy-${GRAALPY_VERSION}-macos-${ARCH}.${EXT}"
          URL="https://github.com/oracle/graalpython/releases/download/graal-${GRAALPY_VERSION}/${FILENAME}"
          mkdir -p $HOME/graalpy
          curl -L -f -o graalpy.pkg "$URL" || { echo "GraalPy asset not found for macos-$ARCH"; exit 1; }
          tar -xzf graalpy.pkg -C $HOME/graalpy --strip-components=1
          echo "$HOME/graalpy/bin" >> $GITHUB_PATH
          graalpy --version

      - name: Cache Python virtual environment
        uses: actions/cache@v3
        with:
          path: .venv
          key: python-venv-${{ runner.os }}-${{ matrix.arch }}-${{ env.GRAALPY_VERSION }}
          restore-keys: |
            python-venv-${{ runner.os }}-${{ matrix.arch }}-

      - name: Setup virtual env and build
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then
            graalpy -m venv .venv
          fi
          source .venv/bin/activate
          python -m pip install --upgrade pip wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          mkdir -p dist
          graalpy -m standalone native --module "${ENTRYPOINT}" --output "dist/${APP_NAME}" --venv ".venv"
          ls -lah dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/

  windows-build:
    runs-on: windows-latest
    env:
      APP_NAME: myapp
      ENTRYPOINT: app.py
    steps:
      - uses: actions/checkout@v4

      - name: Compute VERSION
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="main-latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Get latest GraalPy release
        shell: bash
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/oracle/graalpython/releases/latest \
            | jq -r '.tag_name')
          LATEST_VERSION=${LATEST_TAG#graal-}
          echo "GRAALPY_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "Latest GraalPy version: $LATEST_VERSION"

      - name: Install GraalPy
        shell: bash
        run: |
          EXT=zip
          FILENAME="graalpy-${GRAALPY_VERSION}-windows-amd64.${EXT}"
          URL="https://github.com/oracle/graalpython/releases/download/graal-${GRAALPY_VERSION}/${FILENAME}"
          mkdir -p $Env:USERPROFILE\graalpy
          curl -L -f -o graalpy.pkg "$URL" || { echo "GraalPy asset not found for windows-amd64"; exit 1; }
          powershell -Command "Expand-Archive graalpy.pkg -DestinationPath $Env:USERPROFILE\graalpy"
          echo "$Env:USERPROFILE\graalpy\bin" >> $Env:GITHUB_PATH
          graalpy --version

      - name: Cache Python virtual environment
        uses: actions/cache@v3
        with:
          path: .venv
          key: python-venv-${{ runner.os }}-windows-amd64-${{ env.GRAALPY_VERSION }}
          restore-keys: |
            python-venv-${{ runner.os }}-windows-amd64-

      - name: Setup virtual env and build
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then
            graalpy -m venv .venv
          fi
          source .venv/Scripts/activate
          python -m pip install --upgrade pip wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          mkdir -p dist
          graalpy -m standalone native --module "${ENTRYPOINT}" --output "dist/${APP_NAME}.exe" --venv ".venv"
          dir dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/

  release:
    name: Create GitHub Release
    needs: [linux-build, macos-build, windows-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          # Can repeat per artifact name if needed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

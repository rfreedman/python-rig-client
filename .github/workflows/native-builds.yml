name: Build Native Executables with GraalPy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GRAALPY_VERSION: "24.2.2"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (Ubuntu)
          - os: ubuntu-latest
            graalpy-asset: linux-amd64
            package: deb
          - os: ubuntu-latest
            graalpy-asset: linux-amd64
            package: rpm

          # Fedora / RPM-based Linux
          - os: fedora-latest
            graalpy-asset: linux-amd64
            package: rpm

          # Raspberry Pi (ARM64 Linux)
          - os: ubuntu-22.04
            graalpy-asset: linux-aarch64
            package: deb

          # macOS Intel
          - os: macos-13
            graalpy-asset: macos-amd64
            package: none

          # macOS ARM (Apple Silicon)
          - os: macos-latest
            graalpy-asset: macos-aarch64
            package: none

          # Windows
          - os: windows-latest
            graalpy-asset: windows-amd64
            package: none

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GraalPy standalone
        shell: bash
        run: |
          EXT="tar.gz"
          if [[ "${{ runner.os }}" == "Windows" ]]; then EXT="zip"; fi

          FILENAME="graalpy-${GRAALPY_VERSION}-${{ matrix.graalpy-asset }}.${EXT}"
          URL="https://github.com/oracle/graalpython/releases/download/graal-${GRAALPY_VERSION}/${FILENAME}"

          echo "Downloading GraalPy from $URL"
          mkdir -p $HOME/graalpy
          curl -L -o graalpy.pkg "$URL"

          if [[ "$EXT" == "zip" ]]; then
            unzip graalpy.pkg -d $HOME/graalpy
          else
            tar -xzf graalpy.pkg -C $HOME/graalpy --strip-comp

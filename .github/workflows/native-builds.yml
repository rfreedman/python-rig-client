name: Build native executables (GraalPy standalone + GraalVM Community)

on:
  push:
    branches: [ main ]
    tags: [ "v*", "V*" ]
  pull_request:

env:
  APP_NAME: rigclient
  ENTRYPOINT: rigclient.py
  VERSION: ${{ github.ref_name }}
  GRAALPY_VERSION: 24.1.1   # latest stable GraalPy release

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            arch: x64
            graalpy-asset: linux-amd64
          # Linux ARM64 (Raspberry Pi)
          - os: ubuntu-24.04-arm64
            arch: arm64
            graalpy-asset: linux-aarch64
          # Windows x64
          - os: windows-latest
            arch: x64
            graalpy-asset: windows-amd64
          # macOS Intel
          - os: macos-13
            arch: x64
            graalpy-asset: darwin-amd64
          # macOS ARM (Apple Silicon)
          - os: macos-latest
            arch: arm64
            graalpy-asset: darwin-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM (for native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: '21'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GraalPy standalone
        run: |
          EXT="tar.gz"
          if [[ "${{ runner.os }}" == "Windows" ]]; then EXT="zip"; fi

          FILENAME="graalpy-${GRAALPY_VERSION}-${{ matrix.graalpy-asset }}.${EXT}"
          URL="https://github.com/oracle/graalpython/releases/download/v${GRAALPY_VERSION}/${FILENAME}"

          echo "Downloading GraalPy from $URL"
          mkdir -p $HOME/graalpy
          curl -L -o graalpy.pkg "$URL"

          if [[ "$EXT" == "zip" ]]; then
            unzip graalpy.pkg -d $HOME/graalpy
          else
            tar -xzf graalpy.pkg -C $HOME/graalpy --strip-components=1
          fi

          echo "$HOME/graalpy/bin" >> $GITHU

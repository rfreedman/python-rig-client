[build-system]
requires = ["briefcase==0.3.25", "setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.briefcase]
app_name = "rigclient"
formal_name = "RigClient"
version = "1.0.0"
description = "A sample Python app packaged with BeeWare Briefcase."
author = "Rich Freedman, N2EHL"
author_email = "n2ehl@arrl.net"
url = "rfreedman/python-rig-client"
entry_point = "rigclient:main"
platforms = ["macOS", "Windows", "Linux"]

[tool.briefcase.app.myapp]
module = "rigclient"
requires = ["QtPy==2.4.3, pywebview==6.0"]  # Add your Python dependencies here
